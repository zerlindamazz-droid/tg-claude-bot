name: Keep Alive

on:
  schedule:
    - cron: '*/5 * * * *'   # every 5 minutes, 24/7
  workflow_dispatch:          # allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render service
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://tg-claude-bot-ieu1.onrender.com)
          echo "Ping status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "WARNING: Service returned $STATUS"
          fi
